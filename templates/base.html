<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Organizador de Custos - Gerencie seus gastos mensais de forma intuitiva">
    <title>{% block title %}Organizador de Custos{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css?v=3">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    {% block extra_head %}{% endblock %}
</head>

<body>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <i class="fas fa-wallet"></i>
            <span>Custos</span>
        </div>
        <nav class="sidebar-nav">
            <a href="/?mes={{ mes }}&ano={{ ano }}" class="sidebar-link{% if request.path == '/' %} active{% endif %}">
                <i class="fas fa-tachometer-alt"></i>
                <span>Dashboard</span>
            </a>
            <a href="/gastos?mes={{ mes }}&ano={{ ano }}"
                class="sidebar-link{% if request.path == '/gastos' %} active{% endif %}">
                <i class="fas fa-arrow-up"></i>
                <span>Gastos</span>
            </a>
            <a href="/receitas?mes={{ mes }}&ano={{ ano }}"
                class="sidebar-link{% if request.path == '/receitas' %} active{% endif %}">
                <i class="fas fa-arrow-down"></i>
                <span>Receitas</span>
            </a>
            <a href="/investimentos?mes={{ mes }}&ano={{ ano }}"
                class="sidebar-link{% if request.path == '/investimentos' %} active{% endif %}">
                <i class="fas fa-chart-area"></i>
                <span>Investimentos</span>
            </a>
            <a href="/categorias?mes={{ mes }}&ano={{ ano }}"
                class="sidebar-link{% if request.path == '/categorias' %} active{% endif %}">
                <i class="fas fa-palette"></i>
                <span>Categorias</span>
            </a>
            <a href="/ferramentas?mes={{ mes }}&ano={{ ano }}"
                class="sidebar-link{% if request.path == '/ferramentas' %} active{% endif %}">
                <i class="fas fa-tools"></i>
                <span>Ferramentas</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <form method="POST" action="/logout" style="margin:0;">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
                <button type="submit" class="sidebar-link sidebar-logout"
                    style="background:none;border:none;width:100%;cursor:pointer;text-align:left;">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Sair</span>
                </button>
            </form>
        </div>
    </aside>

    <!-- Page Wrapper -->
    <div class="page-wrapper">

        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <button class="btn-icon sidebar-toggle" id="sidebar-toggle" title="Menu">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="month-selector">
                    <a href="{{ request.path }}?mes={{ prev_mes }}&ano={{ prev_ano }}" class="btn-icon"
                        title="Mês anterior">
                        <i class="fas fa-chevron-left"></i>
                    </a>
                    <span class="month-label">{{ mes_nome }} {{ ano }}</span>
                    <a href="{{ request.path }}?mes={{ next_mes }}&ano={{ next_ano }}" class="btn-icon"
                        title="Próximo mês">
                        <i class="fas fa-chevron-right"></i>
                    </a>
                </div>
                <div class="user-info">
                    <span class="user-greeting">Olá, {{ username }}!</span>
                </div>
            </div>
        </header>

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>

    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <!-- Dados do servidor (lidos pelo app.js via JSON) -->
    <script type="application/json" id="server-toast">{{ toast | tojson }}</script>
    {% block extra_data %}{% endblock %}
    <script src="/static/app.js?v=4"></script>
    <script>
        // Auto-injeta CSRF token em todos os forms que ainda não possuem
        document.querySelectorAll('form[method="POST"], form[method="post"]').forEach(function (form) {
            if (!form.querySelector('input[name="csrf_token"]')) {
                var input = document.createElement('input');
                input.type = 'hidden';
                input.name = 'csrf_token';
                input.value = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
                form.appendChild(input);
            }
        });
    </script>
    {% block extra_scripts %}{% endblock %}
</body>

</html>
