<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha — Organizador de Custos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css?v=10">
</head>

<body>

    <section class="auth-wrapper">
        <div class="auth-card glass-card">
            <div class="auth-brand">
                <div class="brand-icon"><i class="fas fa-lock"></i></div>
                <h2 class="brand-title">Nova Senha</h2>
                <p class="brand-subtitle">Crie uma senha segura para sua conta</p>
            </div>

            {% if error %}
            <p class="auth-msg auth-msg-err"
                style="margin-bottom: 1rem; color: #ef4444; font-size: 0.85rem; text-align: center;">
                <i class="fas fa-exclamation-circle"></i> {{ error }}
            </p>
            {% endif %}

            <form action="/reset-password" method="POST" class="auth-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <input type="hidden" name="token" value="{{ token }}">

                <div class="form-group">
                    <label for="new-pass">Nova Senha (mín. 6 caracteres)</label>
                    <div class="password-wrapper">
                        <input type="password" id="new-pass" name="password" minlength="6"
                            placeholder="Sua nova senha..." required autocomplete="new-password">
                        <button type="button" class="password-toggle" data-target="new-pass" title="Mostrar senha">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block" style="width: 100%;">Redefinir Senha</button>

                <p class="auth-switch"
                    style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: #737373;">
                    Lembrou a senha? <a href="/login"
                        style="color: #ededed; font-weight: 600; text-decoration: none;">Voltar ao login</a>
                </p>
            </form>
        </div>
    </section>

    <script>
        // Password visibility toggle
        document.querySelectorAll('.password-toggle').forEach(btn => {
            btn.addEventListener('click', () => {
                const input = document.getElementById(btn.dataset.target);
                const icon = btn.querySelector('i');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.className = 'fas fa-eye-slash';
                } else {
                    input.type = 'password';
                    icon.className = 'fas fa-eye';
                }
            });
        });
    </script>
</body>

</html>
